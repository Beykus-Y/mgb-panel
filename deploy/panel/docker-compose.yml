services:
  panel:
    build:
      context: ../..
      dockerfile: Dockerfile.panel
    image: mgb-panel:dev
    restart: unless-stopped
    ports:
      - "${PANEL_PORT:-8443}:8443"
    volumes:
      - "${PANEL_STATE_DIR:-./state/panel}:/var/lib/mgb-panel"
    command:
      - "-listen=:8443"
      - "-base-url=${PANEL_BASE_URL:-https://localhost:8443}"
      - "-data-dir=/var/lib/mgb-panel"
      - "-admin-user=${ADMIN_USER:-admin}"
      - "-admin-password=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}"
      - "-enable-local-node=${ENABLE_LOCAL_NODE:-false}"
      - "-local-node-token=${LOCAL_NODE_TOKEN:-}"

  local-node:
    build:
      context: ../..
      dockerfile: Dockerfile.node
      args:
        SINGBOX_IMAGE: "${SINGBOX_IMAGE:-ghcr.io/sagernet/sing-box:v1.13.11}"
        SINGBOX_BINARY_PATH: "${SINGBOX_BINARY_PATH:-/usr/local/bin/sing-box}"
    image: mgb-node:dev
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    depends_on:
      - panel
    volumes:
      - "${LOCAL_NODE_STATE_DIR:-./state/local-node}:/var/lib/mgb-node"
      - "${PANEL_STATE_DIR:-./state/panel}:/panel-state:ro"
    command:
      - "-panel-url=https://127.0.0.1:${PANEL_PORT:-8443}"
      - "-state-dir=/var/lib/mgb-node"
      - "-bootstrap-token-file=/panel-state/local-node/bootstrap-token"
      - "-panel-ca-file=/panel-state/pki/ca.pem"
      - "-singbox-binary=/usr/local/bin/sing-box"
      - "-poll-interval=${LOCAL_NODE_POLL_INTERVAL:-20s}"
